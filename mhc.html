<!DOCTYPE html>
<html>
<head>
    <title>MHC - Mental Health Companion</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: whitesmoke;
        }

        header {
            background-color: mediumpurple;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 0 5px lightgray;
        }

        h2 {
            color: darkgrey;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 8px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            background-color: mediumpurple;
            color: white;
            border: none;
            border-radius: 4px;
        }

        .mood span {
            font-size: 25px;
            margin: 8px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding: 10px;
            background-color: lightgrey;
        }
    </style>
</head>

<body>

<header>
    <h1>MHC - Mental Health Companion</h1>
</header>

<div class="container">

   
    <div class="card">
        <h2>Journal</h2>
        <p>Hi 😊 How are you feeling today?</p>
        <textarea placeholder="Write your thoughts..."></textarea>
        <button>Save Entry</button>
    </div>

   
    <div class="card">
        <h2>Mood Tracking</h2>
        <div class="mood">
            <span>😊</span>
            <span>😞</span>
            <span>😠</span>
            <span>😭</span>
            <span>😨</span>
            <span>🤩</span>
        </div>
        <button>Save Mood</button>
    </div>

   
    <div class="card">
        <h2>Chat AI</h2>
        <p>Start your chat</p>
        <input type="text" placeholder="Type your message..." style="width:80%; padding:6px;">
        <button>Send</button>
    </div>

</div>

<div class="footer">
    2026 Mental Health Companion
</div>

</body>
</html>
